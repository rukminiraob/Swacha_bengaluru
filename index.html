    <!-- Tailwind Play CDN -->

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#00C853',
                        secondary: '#FFFFFF',
                        accent: '#F5F5F5',
                        alert: '#FF5252',
                    },
                    borderRadius: {
                        '3xl': '24px',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 8px 30px rgba(0, 0, 0, 0.05)',
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.1)',
                    }
                }
            }
        }
    </script>
    <style>
        .glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        @keyframes pulse-green {
            0% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
            100% { transform: scale(1); opacity: 0.5; }
        }
        .pulse-effect {
            animation: pulse-green 2s infinite ease-in-out;
        }
        @keyframes track-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(0,255,102,0.5), 0 4px 20px rgba(0,200,83,0.4); }
            50% { box-shadow: 0 0 0 10px rgba(0,255,102,0), 0 4px 30px rgba(0,200,83,0.7); }
        }
        @keyframes bounce-x {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(5px); }
        }
        .track-btn {
            animation: track-glow 1.6s ease-in-out infinite;
        }
        .track-btn-arrow {
            animation: bounce-x 0.8s ease-in-out infinite;
        }
        /* Phone frame styles */
        html, body {
            margin: 0;
            padding: 0;
            background: #1a1d20 !important;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #phone-frame {
            width: 390px;
            min-width: 390px;
            max-width: 390px;
            min-height: 844px;
            background: white;
            border-radius: 52px;
            box-shadow: 0 0 0 12px #2a2d32, 0 0 0 16px #404550, 0 40px 100px rgba(0,0,0,0.7);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            flex-grow: 0;
        }
        #phone-notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 126px;
            height: 36px;
            background: #1a1d20;
            border-radius: 0 0 22px 22px;
            z-index: 9999;
        }
        #phone-home-bar {
            display: flex;
            justify-content: center;
            padding: 10px 0 14px;
            background: white;
        }
        #phone-home-bar span {
            width: 120px;
            height: 5px;
            background: #cbd5e1;
            border-radius: 9999px;
            display: block;
        }
        #root {
            padding-top: 36px;
        }
    </style>
</head>

        const AppContext = createContext();

        const AppProvider = ({ children }) => {
            const [eta, setEta] = useState(10);
            return (
                <AppContext.Provider value={{ eta }}>
                    {children}
                </AppContext.Provider>
            );
        };

        const Icon = ({ name, size = 24, className = "", fill = "none", strokeWidth = 2 }) => {
            const spanRef = React.useRef(null);
            
            React.useEffect(() => {
                if (spanRef.current) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}" class="${className}" style="width:${size}px; height:${size}px;" fill="${fill}" stroke-width="${strokeWidth}"></i>`;
                    lucide.createIcons({
                        root: spanRef.current,
                        nameAttrs: ['data-lucide']
                    });
                }
            }, [name, size, className, fill, strokeWidth]);
            
            return <span ref={spanRef} className="inline-flex items-center justify-center pointer-events-none"></span>;
        };

        // Screens based on images
        const Onboarding1 = ({ onNext }) => (
            <div className="flex flex-col h-full bg-gradient-to-b from-[#F0FCF5] to-[#F9FDFB] p-6 text-center relative overflow-hidden">
                <div className="flex justify-end pt-2 pb-6">
                    <button onClick={onNext} className="text-slate-500 font-medium text-sm hover:text-slate-800 transition-colors">
                        Skip
                    </button>
                </div>
                
                <div className="flex-1 flex flex-col items-center justify-center -mt-8">
                    <div className="relative mb-12">
                        <div className="w-72 h-72 bg-[#00FF66]/10 rounded-full flex items-center justify-center">
                            <div className="w-[200px] h-[200px] bg-[#00FF66]/20 rounded-full flex items-center justify-center">
                                {/* The truck icon is filled with bright green */}
                                <Icon name="Truck" className="text-[#00FC66] fill-[#00FC66]" size={100} strokeWidth={0} />
                            </div>
                        </div>
                        {/* Floating Bell Icon */}
                        <div className="absolute top-4 right-0 bg-white p-3.5 rounded-[20px] shadow-[0_8px_30px_rgba(0,0,0,0.06)] border border-slate-50">
                             <Icon name="Bell" className="text-[#00FF66]" size={28} strokeWidth={2} />
                        </div>
                        {/* Floating Location Icon */}
                        <div className="absolute bottom-6 -left-2 bg-white p-3.5 rounded-[20px] shadow-[0_8px_30px_rgba(0,0,0,0.06)] border border-slate-50">

                        </div>

                        Never miss your garbage pickup again
                    </h1>
                    <p className="text-lg text-slate-500 font-medium leading-relaxed px-4">
                        Get real-time alerts when the collection truck is nearing your street.
                    </p>
                </div>

                <div className="pb-8 space-y-5 px-2">
                    <button 
                        onClick={onNext}
                        className="w-full bg-[#00FF66] text-[#000000] font-bold py-4 rounded-[20px] shadow-lg shadow-[#00FF66]/20 flex items-center justify-center gap-2 hover:bg-[#00E55A] active:scale-95 transition-all text-lg"

                        <Icon name="Crosshair" size={22} strokeWidth={2.5} /> Enable Location

                    <p className="text-slate-500 font-medium text-base cursor-pointer hover:text-slate-800 transition-colors" onClick={onNext}>Skip for now</p>

            </div>
        );

                {/* Top Graphic Section */}
                <div className="flex-1 flex flex-col items-center justify-center relative p-6 mt-4">
                    <div className="w-[280px] h-[280px] bg-white rounded-[48px] shadow-[0_12px_48px_rgba(0,0,0,0.06)] flex flex-col items-center justify-center relative">

                        <div className="w-[104px] h-[104px] bg-[#00FF66] rounded-full flex items-center justify-center relative z-10 shadow-lg shadow-[#00FF66]/20">

                                <div className="absolute top-[10px] w-[14px] h-[14px] bg-[#00FF66] rounded-full z-10"></div>
                            </div>
                        </div>

                            <div className="rotate-[45deg] -mt-1"><Icon name="Navigation" size={24} className="fill-black" strokeWidth={0} /></div> Enable Location

                                     <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">W2</span>
                                </div>
                                <div className="flex-1 flex flex-col items-center gap-3 h-full group">
                                     <div className="w-full bg-primary rounded-t-xl h-[95%] shadow-lg shadow-primary/30 relative">
                                        <div className="absolute -top-10 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[9px] px-2 py-1 rounded-lg font-black shadow-xl">64kg</div>
                                     </div>
                                     <span className="text-[9px] font-black text-primary uppercase tracking-widest">W3</span>
                                </div>
                                <div className="flex-1 flex flex-col items-center gap-3 h-full group">
                                     <div className="w-full bg-primary/60 rounded-t-xl h-[75%] group-hover:bg-primary/80 transition-all duration-300"></div>
                                     <span className="text-[9px] font-black text-slate-400 uppercase tracking-widest">W4</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div className="px-8 pb-32">
                        <h3 className="text-xl font-black text-slate-900 tracking-tight mb-6">Recent Activity</h3>
                        <div className="space-y-4">
                             {[
                                { title: 'Dry Waste Pickup', area: 'Koramangala 4th Block', weight: '+5.2 kg', time: 'Yesterday', icon: 'Box' },
                                { title: 'Wet Waste Segregation', area: 'Indiranagar Sector A', weight: '+2.8 kg', time: '2 days ago', icon: 'Leaf' }
                             ].map((act, i) => (
                                <div key={i} className="bg-white p-5 rounded-[32px] border border-slate-50 shadow-soft flex items-center justify-between">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-primary/10 rounded-2xl text-primary">
                                            <Icon name={act.icon} size={20} />
                                        </div>
                                        <div>
                                            <p className="font-black text-slate-900 text-sm leading-none">{act.title}</p>
                                            <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-2">{act.area}</p>
                                        </div>
                                    </div>
                                    <div className="text-right">
                                        <p className="font-black text-primary text-sm leading-none">{act.weight}</p>
                                        <p className="text-[9px] font-black text-slate-400 uppercase tracking-widest mt-2">{act.time}</p>
                                    </div>
                                </div>
                             ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const SettingsScreen = ({ onBack, onLogout, onNav }) => (
            <div className="flex flex-col h-full bg-[#F7FCF9] overflow-hidden">
                <header className="flex items-center px-6 py-4 justify-between bg-white border-b border-slate-50 shrink-0">
                    <button onClick={onBack} className="p-2 -ml-2 text-primary hover:bg-slate-50 rounded-full">
                        <Icon name="ArrowLeft" />
                    </button>
                    <h2 className="text-lg font-black text-slate-900">My Profile</h2>
                    <div className="w-8 h-8"></div>
                </header>
                <div className="flex-1 overflow-y-auto px-6 py-8 pb-32">
                    <div className="flex flex-col items-center mb-8">
                        <div className="w-24 h-24 rounded-full border-4 border-white shadow-soft mb-4 overflow-hidden bg-slate-100 flex items-center justify-center">
                            <div className="w-full h-full bg-cover bg-center" style={{ backgroundImage: 'url(\'https://lh3.googleusercontent.com/aida-public/AB6AXuBHNBOvyF2FaFNt-un45tyfwv6C9zIxgssCS4-XrxVrmU4z6VsCaezLS-3XwWDs368lorXtlJTkm0VVwONSN3zoXmr_LevmHsaNT-ydDJcVEmNmOEfEIT99Z159iQ2kRucrkaULMDX1JXSRhyITj8ZxAf1DsBL2IWE0BkDYARnzzFJz28n5kxfAOWcBAXn1GwHvp93LQ5_ahOWm_NsB5WrnBFQo9PrIGhjZOKa7rgP-lk9WQAHSIoDsr6kUC0GSksMNJAsSkZfaAA\')' }}></div>
                        </div>
                        <h3 className="text-xl font-black text-slate-900">John Doe</h3>
                        <p className="text-sm text-primary font-bold mt-1">Edit Profile</p>
                    </div>

                    <div className="bg-white rounded-[24px] shadow-soft border border-slate-50 overflow-hidden mb-6">
                        <div className="flex items-center gap-4 p-5 border-b border-slate-50 cursor-pointer">
                            <div className="bg-primary/10 p-2 rounded-xl text-primary"><Icon name="Globe" size={20} /></div>
                            <span className="flex-1 font-bold text-slate-900">Language</span>
                            <span className="text-slate-400 text-sm font-bold">English</span>
                            <Icon name="ChevronRight" size={16} className="text-slate-300" />
                        </div>
                        <div className="flex items-center gap-4 p-5 border-b border-slate-50 cursor-pointer" onClick={() => onNav('Notifications')}>
                            <div className="bg-primary/10 p-2 rounded-xl text-primary"><Icon name="Bell" size={20} /></div>
                            <span className="flex-1 font-bold text-slate-900">Notifications</span>
                            <Icon name="ChevronRight" size={16} className="text-slate-300" />
                        </div>
                        <div className="flex items-center gap-4 p-5 border-b border-slate-50 cursor-pointer">
                            <div className="bg-primary/10 p-2 rounded-xl text-primary"><Icon name="Shield" size={20} /></div>
                            <span className="flex-1 font-bold text-slate-900">Privacy Policy</span>
                            <Icon name="ChevronRight" size={16} className="text-slate-300" />
                        </div>
                        <div className="flex items-center gap-4 p-5 cursor-pointer">
                            <div className="bg-primary/10 p-2 rounded-xl text-primary"><Icon name="HelpCircle" size={20} /></div>
                            <span className="flex-1 font-bold text-slate-900">Help & Support</span>
                            <Icon name="ChevronRight" size={16} className="text-slate-300" />
                        </div>
                    </div>

                    <button onClick={onLogout} className="w-full flex items-center justify-center gap-2 text-[#FF5252] font-black py-4 rounded-3xl bg-[#FF5252]/10 active:scale-95 transition-transform">
                        <Icon name="LogOut" size={20} /> Logout
                    </button>
                </div>
            </div>
        );

        const ExitConfirmationScreen = ({ onCancel, onConfirm }) => (
            <div className="flex flex-col h-full bg-white relative overflow-hidden">
                <header className="flex items-center px-6 py-4 justify-between bg-white border-b border-slate-50 shrink-0">
                    <button onClick={onCancel} className="p-2 -ml-2 text-primary hover:bg-slate-50 rounded-full">
                        <Icon name="ArrowLeft" />
                    </button>
                    <h2 className="text-lg font-black text-slate-900 absolute left-1/2 -translate-x-1/2">Swachha Bengaluru</h2>
                    <div className="w-8 h-8"></div>
                </header>

                <div className="flex-1 flex flex-col items-center justify-center px-8 text-center pb-12">
                    <div className="w-[180px] h-[180px] bg-[#EAFBF0] rounded-[48px] flex items-center justify-center mb-10 shadow-sm">
                         <div className="text-[#00FF66] border-[8px] border-[#00FF66] rounded-2xl p-4">
                            <Icon name="LogOut" size={64} />
                         </div>
                    </div>

                    <h1 className="text-[36px] font-black text-[#1A1D20] leading-[1.1] mb-5 tracking-tight">
                        Leaving so soon?
                    </h1>
                    
                    <p className="text-slate-500 text-[17px] font-medium leading-relaxed px-2 mb-12">
                        You won't receive real-time alerts for<br/>
                        <span className="text-[#1A1D20] font-black uppercase tracking-tight">BBMP vehicles</span> while logged out.
                    </p>

                    <div className="w-full space-y-4">
                        <button 
                            onClick={onConfirm}
                            className="w-full bg-[#00FF66] text-[#000000] font-black py-[22px] rounded-[24px] shadow-lg shadow-[#00FF66]/20 flex items-center justify-center gap-3 active:scale-95 transition-all text-lg"
                        >
                            Log Out <Icon name="LogOut" size={24} />
                        </button>
                        
                        <button 
                            onClick={onCancel}
                            className="w-full bg-[#F3F6F9] text-[#1A1D20] font-black py-[22px] rounded-[24px] active:scale-95 transition-all text-[15px] uppercase tracking-wider"
                        >
                            STAY LOGGED IN
                        </button>
                    </div>
                </div>

                <div className="py-10 flex flex-col items-center gap-2 shrink-0">
                    <p className="text-[10px] font-black text-slate-300 tracking-[0.2em] uppercase">VERSION 1 (2026)</p>
                    <div className="flex items-center gap-1.5 text-[#00FF66] font-bold text-sm">
                        Made with <span className="animate-pulse">Ã¢ÂÂ¤</span> for Bengaluru
                    </div>
                </div>
            </div>
        );

        const Navbar = ({ active, onNav }) => (
            <div className="absolute bottom-0 left-0 right-0 z-[100] px-4 pb-6 pointer-events-none">
                <div className="bg-white/95 backdrop-blur-3xl rounded-[40px] p-2 flex items-center justify-between shadow-[0_-8px_40px_rgba(0,0,0,0.08)] ring-1 ring-black/[0.02] pointer-events-auto border border-white/60">
                    {[
                        { label: 'Home', icon: 'home' },
                        { label: 'Report', icon: 'file-text' },
                        { label: 'Explore', icon: 'map' }
                    ].map((item, i) => {
                        const isActive = active === item.label;
                        return (
                            <div 
                                key={i} 
                                onClick={() => onNav(item.label)}
                                className={`flex-1 flex flex-col items-center gap-1 py-3 cursor-pointer transition-all duration-300 ${isActive ? 'text-[#00FF66]' : 'text-slate-400 hover:text-slate-600'}`}
                            >
                                <Icon name={item.icon} size={24} className={`${isActive ? 'scale-110' : ''} transition-transform group-active:scale-95`} />
                                <span className={`text-[10px] font-bold uppercase tracking-wider ${isActive ? 'opacity-100' : 'opacity-80'}`}>{item.label}</span>
                            </div>
                        );
                    })}
                </div>
            </div>
        );



        const App = () => {
            const [history, setHistory] = useState([1]);
            const screen = history[history.length - 1];

            const screenMap = {
                'Home': 5,
                'Explore': 8,
                'Collection': 9,
                'Report': 10,
                'Success': 11,
                'Settings': 12,
                'Profile': 12
            };

            const navigateTo = (target) => {
                if (typeof target === 'string') {
                    setHistory(prev => [...prev, screenMap[target] || 6]);
                } else {
                    setHistory(prev => [...prev, target]);
                }
            };

            const goBack = () => {
                setHistory(prev => prev.length > 1 ? prev.slice(0, -1) : prev);
            };

            const screens = [
                { id: 1, name: 'Intro', component: <Onboarding1 onNext={() => navigateTo(2)} /> },
                { id: 2, name: 'Location Permission', component: <Onboarding2 onNext={() => navigateTo(15)} onSkip={() => navigateTo(6)} onBack={goBack} /> },
                { id: 15, name: 'Select Location', component: <SelectLocationScreen onNext={() => navigateTo(4)} onBack={goBack} /> },
                { id: 3, name: 'Offline State', component: <OfflineScreen onRetry={() => navigateTo(6)} onNav={navigateTo} onBack={goBack} /> },
                { id: 4, name: 'Notifications', component: <NotificationScreen onNext={() => navigateTo(5)} onBack={goBack} /> },
                { id: 5, name: 'Monitoring Status', component: <MonitoringStatusScreen onNext={() => navigateTo(6)} onMenu={() => navigateTo(12)} onBack={goBack} /> },
                { id: 6, name: 'Dashboard', component: <Dashboard onNext={navigateTo} onUnavailable={() => navigateTo(7)} onMap={() => navigateTo(8)} onMenu={() => navigateTo(12)} onBack={goBack} /> },
                { id: 7, name: 'Tracking Unavailable', component: <LiveTrackingUnavailableScreen onRetry={() => navigateTo(6)} onHome={() => navigateTo(6)} onMenu={() => navigateTo(12)} onBack={goBack} /> },
                { id: 8, name: 'Delivery ETA', component: <DeliveryETAScreen onNext={navigateTo} onMenu={() => navigateTo(12)} onBack={goBack} /> },
                { id: 9, name: 'Collection Status', component: <CollectionStatusScreen onMarkAsDisposed={() => navigateTo('Success')} onReportMissed={() => navigateTo('Report')} onMenu={() => navigateTo('Settings')} onBack={goBack} /> },
                { id: 10, name: 'Report Issue', component: <ReportScreen onBack={goBack} onSubmit={() => { navigateTo(6); }} /> },
                { id: 11, name: 'Success Confirmation', component: <ConfirmationScreen onBackToHome={() => navigateTo(6)} onBack={goBack} /> },
                { id: 12, name: 'Settings', component: <SettingsScreen onBack={goBack} onLogout={() => navigateTo(14)} onNav={navigateTo} /> },
                { id: 13, name: 'My Impact', component: <ImpactScreen onBack={goBack} onNav={navigateTo} /> },
                { id: 14, name: 'Exit Confirmation', component: <ExitConfirmationScreen onCancel={() => navigateTo(12)} onConfirm={() => navigateTo(1)} onBack={goBack} /> }
            ];

            const currentScreen = screens.find(s => s.id === screen);

            return (
                <div className="w-[390px] bg-white relative flex flex-col" style={{ minHeight: '844px', height: '100%' }}>
                    <AnimatePresence mode="wait">
                        <motion.div
                            key={screen}
                            initial={{ opacity: 0, x: 10 }}
                            animate={{ opacity: 1, x: 0 }}
                            exit={{ opacity: 0, x: -10 }}
                            transition={{ duration: 0.25, ease: "easeInOut" }}
                            className="flex-1 overflow-y-auto hide-scrollbar pb-28"
                        >
                            {currentScreen ? currentScreen.component : <div className="p-10 text-center">Screen {screen} not found</div>}
                        </motion.div>
                    </AnimatePresence>
                    {![1, 2, 15, 3, 4, 14].includes(screen) && (
                        <Navbar active={currentScreen ? currentScreen.name : 'Home'} onNav={navigateTo} />
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AppProvider><App /></AppProvider>);
    </script>

</body>
</html>
