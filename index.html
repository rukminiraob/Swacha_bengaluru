<!DOCTYPE html>
<html>
<head>
  <title>Swacha Bengaluru</title>

  <!-- Tailwind (for your UI styles) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    #map {
      height: 350px;
      width: 100%;
      border-radius: 16px;
    }
  </style>
</head>

<body class="bg-gray-100 p-4">

  <!-- Header -->
  <h2 class="text-xl font-bold mb-4">Live Ward Tracking</h2>

  <!-- Map Container -->
  <div id="map"></div>

  <!-- Info Card -->
  <div class="mt-4 bg-white p-4 rounded-xl shadow">
    <h3 class="font-bold text-lg">JP Nagar 4th Phase</h3>
    <p class="text-gray-500">Ward monitoring active</p>

    <button class="mt-3 bg-green-500 text-white px-4 py-2 rounded-lg">
      TRACK NOW
    </button>
  </div>

  <!-- Map Script -->
  <script>
    document.addEventListener("DOMContentLoaded", function () {

      var map = L.map('map').setView([12.9716, 77.5946], 13);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);

      // Marker (your green dot)
      L.circleMarker([12.9716, 77.5946], {
        radius: 8,
        color: 'green',
        fillColor: '#22c55e',
        fillOpacity: 1
      }).addTo(map);

      // 🔥 FIX FOR GREY MAP ISSUE
      setTimeout(function () {
        map.invalidateSize();
      }, 500);

    });
  </script>

</body>
</html>
